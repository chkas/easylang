txt_tutor=`* Public-key cryptography

+ Public-key cryptography is a mechanism for securely transferring information between two participants without them needing to know a shared secret key.

+ It is based on the concept that a public key can be freely distributed, while a private key must be kept secret.

* RSA

+ Directly supports encryption and digital signatures.

+ The trick is that breaking RSA would require factoring a huge number, which is extremely hard.

+ This lets anyone send you secret messages only you can read.

+ You can also use RSA to sign messages so others know they really came from you.

* RSA demo with small numbers

+ First, we need two prime numbers. In this example, the prime numbers are 3 digits long. For RSA to be secure, they must be at least 300 digits long.

+ These numbers remain secret, as they form the private key. The decryption key can be derived directly from these factors.

+ The public key is the product of these numbers. The product is used for encryption. Unlike with large numbers, the factors of small numbers are easy to find.

func isprim n .
   i = 2
   while i <= sqrt n
      if n mod i = 0 : return 0
      i += 1
   .
   return 1
.
func genfactor .
   p = 100 + random 895
   while isprim p = 0 : p += 1
   return p
.
proc extgcd a b &x &y .
   if b = 0
      x = 1
      y = 0
   else
      extgcd b (a mod b) x1 y1
      x = y1
      y = x1 - (a div b) * y1
   .
.
func modinv e phi .
   extgcd e phi x y
   return x mod phi
.
proc genrsakey &n &d .
   p = genfactor
   q = genfactor
   n = p * q
   phi = (p - 1) * (q - 1)
   d = modinv 65537 phi
.
genrsakey n d
print "Public key n: " & n
storeput "rsa-n" n
storeput "rsa-d" d

-

+ Encryption is done with the public key *n* with *msg ^ 65536 mod n*

+ For decryption you need also the private key *d*: *emsg ^ d mod n*

n = number storeget "rsa-n"
d = number storeget "rsa-d"
func mpow b e m .
   r = 1
   while e > 0
      if e mod 2 = 1 : r = (r * b) mod m
      b = (b * b) mod m
      e = e div 2
   .
   return r
.
msg = 12345
enc = mpow msg 65537 n
print "Encrypted: " & enc
#
dec = mpow enc d n
print "Decrypted: " & dec

* Breaking RSA

+ To break RSA, we only need to factorize the public key into its prime factors. Which is trivial with this short key, of course.

n = number storeget "rsa-n"
print "Public key n: " & n
proc extgcd a b &x &y .
   if b = 0
      x = 1
      y = 0
   else
      extgcd b (a mod b) x1 y1
      x = y1
      y = x1 - (a div b) * y1
   .
.
func modinv e phi .
   extgcd e phi x y
   return x mod phi
.
p = 3
while n mod p <> 0
   p += 2
.
q = n div p
print "p:" & p
print "q:" & q
d = modinv 65537 ((p - 1) * (q - 1))
print "d:" & d

* Big number functions

+ Big numbers can be expressed as arrays of numbers. This is a library in Easylang that implements arithmetic operations with big numbers. This library must be set for the following examples.

#lib
func[] bn s$ .
   i = len s$ - 7 + 1
   while i >= -5
      r[] &= number substr s$ i 7
      i -= 7
   .
   return r[]
.
func$ bns bn[] .
   s$ = bn[$]
   for i = len bn[] - 1 downto 1
      h$ = bn[i]
      s$ &= substr "0000000" 1 (7 - len h$) & h$
   .
   return s$
.
func[] bnmul a[] b[] .
   len r[] len a[] + len b[]
   if len a[] > len b[] : swap a[] b[]
   for ia = 1 to len a[]
      h = 0
      for ib = 1 to len b[]
         h += r[ia + ib - 1] + b[ib] * a[ia]
         r[ia + ib - 1] = h mod 10000000
         h = h div 10000000
      .
      r[ia + ib - 1] += h
   .
   while r[$] = 0 and len r[] > 1 : len r[] -1
   return r[]
.
func[] bnadd a[] b[] .
   if len b[] > len a[] : swap a[] b[]
   len r[] len a[]
   for i = 1 to len r[]
      v = 0
      if i <= len b[] : v = b[i]
      h += a[i] + v
      r[i] = h mod 10000000
      h = h div 10000000
   .
   if h > 0 : r[] &= h
   while len r[] > 1 and r[$] = 0 : len r[] -1
   return r[]
.
func bncmp a[] b[] .
   if len a[] > len b[] : return 1
   if len a[] < len b[] : return -1
   for i = len a[] downto 1
      if a[i] > b[i] : return 1
      if a[i] < b[i] : return -1
   .
   return 0
.
func[] bnsub a[] b[] .
   len r[] len a[]
   for i = 1 to len r[]
      v = 0
      if i <= len b[] : v = b[i]
      h = a[i] - v - h
      if h < 0
         r[i] = h + 10000000
         h = 1
      else
         r[i] = h
         h = 0
      .
   .
   while r[$] = 0 and len r[] > 1 : len r[] -1
   return r[]
.
func[][] bndivmod a[] b[] .
   if bncmp a[] b[] < 0 : return [ [ 0 ] a[] ]
   lb = len b[]
   d = 10000000 div (b[lb] + 1)
   if d > 1
      for i = 1 to lb
         c += b[i] * d
         b[i] = c mod 10000000
         c = c div 10000000
      .
      for i = 1 to len a[]
         c += a[i] * d
         a[i] = c mod 10000000
         c = c div 10000000
      .
   .
   a[] &= c
   #
   len q[] len a[] - lb
   v1 = b[lb]
   if lb >= 2 : v2 = b[lb - 1]
   for j = len q[] downto 1
      u0 = a[j + lb]
      u1 = a[j + lb - 1]
      u2 = 0
      if j + lb >= 2 : u2 = a[j + lb - 2]
      if u0 = v1
         qh = 9999999
         rh = u1 + v1
      else
         h = u0 * 10000000 + u1
         qh = h div v1
         rh = h mod v1
      .
      while rh < 10000000 and qh * v2 > 10000000 * rh + u2
         qh -= 1
         rh += v1
      .
      k = 0
      for i = 1 to lb
         p = qh * b[i] + k
         k = p div 10000000
         t = a[j + i - 1] - (p mod 10000000)
         if t < 0
            t += 10000000
            k += 1
         .
         a[j + i - 1] = t
      .
      t = a[j + lb] - k
      if t < 0
         qh -= 1
         k = 0
         for i = 1 to lb
            t = a[j + i - 1] + b[i] + k
            a[j + i - 1] = t mod 10000000
            k = t div 10000000
         .
         a[j + lb] = t + k
      else
         a[j + lb] = t
      .
      q[j] = qh
   .
   if d > 1
      k = 0
      for i = lb downto 1
         t = k * 10000000 + a[i]
         a[i] = t div d
         k = t mod d
      .
   .
   len a[] lb
   while len q[] > 1 and q[len q[]] = 0 : len q[] len q[] - 1
   while len a[] > 1 and a[len a[]] = 0 : len a[] len a[] - 1
   return [ q[] a[] ]
.
func[] bnmod a[] n[] .
   result[][] = bndivmod a[] n[]
   return result[2][]
.
func[] bndiv a[] n[] .
   result[][] = bndivmod a[] n[]
   return result[1][]
.
func[] bnpowmod base[] exp[] m[] .
   r[] = [ 1 ]
   b[] = bnmod base[] m[]
   e[] = exp[]
   while bncmp e[] [ 0 ] > 0
      if e[1] mod 2 = 1
         r[] = bnmul r[] b[]
         r[] = bnmod r[] m[]
      .
      h = 0
      for i = len e[] downto 1
         h = h * 10000000 + e[i]
         e[i] = h div 2
         h = h mod 2
      .
      while e[$] = 0 and len e[] > 1 : len e[] -1
      b[] = bnmul b[] b[]
      b[] = bnmod b[] m[]
   .
   return r[]
.
func[] bnrandr n[] .
   len r[] len n[]
   for i = 1 to len n[]
      r[i] = random 10000000 - 1
   .
   r[$] = r[$] mod n[$]
   if bncmp r[] [ 2 ] < 0 : return [ 2 ]
   return r[]
.
func bnprim n[] k .
   nm1[] = bnsub n[] [ 1 ]
   d[] = nm1[]
   while d[1] mod 2 = 0
      h = 0
      for i = len d[] downto 1
         h = h * 10000000 + d[i]
         d[i] = h div 2
         h = h mod 2
      .
      while d[$] = 0 and len d[] > 1 : len d[] -1
      s += 1
   .
   for i = 1 to k
      a[] = bnrandr n[]
      x[] = bnpowmod a[] d[] n[]
      if bncmp x[] [ 1 ] <> 0 and bncmp x[] nm1[] <> 0
         for r = 1 to s - 1
            x[] = bnmul x[] x[]
            x[] = bnmod x[] n[]
            if bncmp x[] [ 1 ] = 0 : return 0
            if bncmp x[] nm1[] = 0 : break 1
         .
         if r >= s : return 0
      .
   .
   return 1
.
func[] bnrand ndig .
   narr = ndig div 7 + 1
   ndigh = ndig mod 7
   len r[] narr
   for i = 1 to narr - 1 : r[i] = random 10000000 - 1
   r[narr] = random (pow 10 ndigh - 1)
   return r[]
.
func[] bnmodinv a[] n[] .
   t0[] = [ 0 ]
   t1[] = [ 1 ]
   r0[] = n[]
   r1[] = bnmod a[] n[]
   while bncmp r1[] [ 0 ] > 0
      h[][] = bndivmod r0[] r1[]
      q[] = h[1][]
      r2[] = h[2][]
      h[] = bnmul q[] t1[]
      h[] = bnmod h[] n[]
      t2[] = bnadd t0[] n[]
      t2[] = bnsub t2[] h[]
      t2[] = bnmod t2[] n[]
      r0[] = r1[]
      r1[] = r2[]
      t0[] = t1[]
      t1[] = t2[]
   .
   if bncmp r0[] [ 1 ] <> 0 : return [ 0 ]
   return t0[]
.

* RSA with big numbers

+ First, we need two large random prime numbers. At least about 300 decimal places, so that they are reasonably secure.

+ With such large numbers, it is almost impossible to guarantee that they are prime, but it is possible to determine this with a high degree of probability.

+ These numbers remain secret because they are the private key. The decryption key can be derived directly from these factors.

+ The public key is the product of these numbers, which is then twice as long. So, 600 digits or more if it is to be secure. It is (currently) not possible for computers to break this number down into its factors

+ In our example, we use 100 digits for the factors.

func[] genfactor n .
   p[] = bnrand n
   if p[1] mod 2 = 0 : p[1] += 1
   while bnprim p[] 20 = 0
      write "."
      p[] = bnadd p[] [ 2 ]
   .
   print ""
   return p[]
.
proc genrsakey &n[] &d[] .
   p[] = genfactor 100
   q[] = genfactor 100
   n[] = bnmul p[] q[]
   p[] = bnsub p[] [ 1 ]
   q[] = bnsub q[] [ 1 ]
   phi[] = bnmul p[] q[]
   d[] = bnmodinv [ 65537 ] phi[]
.
genrsakey n[] d[]
print "Public key: " & bns n[]
storeput "rsa-publ" bns n[]
storeput "rsa-priv" bns d[]

-

+ In this example, a short string is converted into a number that is smaller than the public key. It can then be encrypted and decrypted with a single operation

+ Encryption is done with the public key *n* with *msg ^ 65536 mod n*

func[] rsaenc n[] m$ .
   for c$ in strchars m$
      h = strcode c$ - 28
      if h <= 9 : mn$ &= 0
      mn$ &= h
   .
   return bnpowmod bn mn$ [ 65537 ] n[]
.
n[] = bn storeget "rsa-publ"
print "Public key: " & bns n[]
print ""
enc[] = rsaenc n[] "This is for my eyes only."
print "Encrypted with public key: " & bns enc[]
storeput "rsa-enc" bns enc[]

+ Decryption is done with the private key *d* with *emsg ^ d mod n*

func$ rsadec n[] d[] enc[] .
   m2[] = bnpowmod enc[] d[] n[]
   mn$ = bns m2[]
   for i = 1 step 2 to len mn$
      m$ &= strchar (number substr mn$ i 2 + 28)
   .
   return m$
.
n[] = bn storeget "rsa-publ"
d[] = bn storeget "rsa-priv"
enc[] = bn storeget "rsa-enc"
print "Decrypted with private key: " & rsadec n[] d[] enc[]

+ In practice, a random secret key is (was) encrypted, which is (was) then used to encrypt and decrypt the data, as symmetric cryptography is much faster.

+ But actually, RSA is no longer used for encryption, only for digital signatures.

+ The reason for this is that there is a risk that the private key will be disclosed at some point, allowing all data to be decrypted, including data from the past.

+ Instead, Diffie-Hellman (or an equivalent method using elliptic curves) is now used, allowing both partners to securely agree on an encryption key.

* RSA for signing

+ To sign, a cryptographic checksum (such as *SHA256*) is usually calculated from the message, which is then applied using the private RSA operation with the private key.

+ For our demo example, we use a short message, which works without such a checksum.  You just have to convert the message into a number that is smaller than the modulus and then apply the RSA operation to it.

func[] rsa_sign d[] n[] m$ .
   for c$ in strchars m$
      h = strcode c$ - 28
      if h <= 9 : mn$ &= 0
      mn$ &= h
   .
   return bnpowmod bn mn$ d[] n[]
.
n[] = bn storeget "rsa-publ"
d[] = bn storeget "rsa-priv"
#
msg$ = "I hereby order 99 pizzas."
msg[] = rsa_sign d[] n[] msg$
storeput "rsa-msg" bns msg[]
print "Signed: " & msg$

+ Anyone with the author's public key can then decode this message. Of course, it is not protected from being seen by others.

+ But what we do know is that if we can decrypt it, the message was encoded with the corresponding private key. Only the author can do this, and it has not been changed since it was signed.

func$ rsa_verify n[] m[] .
   m2[] = bnpowmod m[] [ 65537 ] n[]
   mn$ = bns m2[]
   for i = 1 step 2 to len mn$
      m$ &= strchar (number substr mn$ i 2 + 28)
   .
   return m$
.
msg[] = bn storeget "rsa-msg"
n[] = bn storeget "rsa-publ"
msg$ = rsa_verify n[] msg[]
print "Verified: " & msg$

* Diffie-Hellman (DH)

+ DH does not encrypt or sign itself. Instead, it enables two parties to derive a shared secret over an insecure channel. This shared secret is then used as a symmetric key for a cipher such as *AES*.

+ The following demo uses a 1024-bit (309 decimal digits) modulus, which is no longer considered secure.

-

+ Alice chooses a random 48-digit number. This is her private key *a*. *p* is the modulus, which is a fixed 309-digit number. She calculates the public key *A* from the private key using: *2 ^ a mod p*.

+ This operation is easy to calculate, whereas the reverse operation - the discrete logarithm for large numbers - is practically impossible to calculate. This means that Alice's public key *A* cannot be used to deduce *a*.

p[] = bn "179769313486231590770839156793787453197860296048756011706444423684197180216158519368947833795864925541502180565485980503646440548199239100050792877003355816639229553136239076508735759914822574862575007425302077447712589550957937778424442426617334727629299387668709205606050270810842907692932019128194467627007"
g[] = [ 2 ]
#
a[] = bnrand 48
storeput "dh-a" bns a[]
#
A[] = bnpowmod g[] a[] p[]
storeput "dh-A" bns A[]
print "Public-Alice: " & bns A[]

+ Bob does the same as Alice to choose his private key and derive the public part of it.

+ Then, using Alice's public key and his private key, he calculates the secret session key using the formula *A ^ b mod p*.

p[] = bn "179769313486231590770839156793787453197860296048756011706444423684197180216158519368947833795864925541502180565485980503646440548199239100050792877003355816639229553136239076508735759914822574862575007425302077447712589550957937778424442426617334727629299387668709205606050270810842907692932019128194467627007"
g[] = [ 2 ]
#
b[] = bnrand 48
B[] = bnpowmod g[] b[] p[]
print "Public-Bob: " & bns B[]
storeput "dh-B" bns B[]
print ""
A[] = bn storeget "dh-A"
secr[] = bnpowmod A[] b[] p[]
print "Common secret: " & bns secr[]

+ Similarly, Alice calculates *B ^ a mod p* and, remarkably, obtains the same session key.

p[] = bn "179769313486231590770839156793787453197860296048756011706444423684197180216158519368947833795864925541502180565485980503646440548199239100050792877003355816639229553136239076508735759914822574862575007425302077447712589550957937778424442426617334727629299387668709205606050270810842907692932019128194467627007"
a[] = bn storeget "dh-a"
B[] = bn storeget "dh-B"
secr[] = bnpowmod B[] a[] p[]
print "Common secret: " & bns secr[]

+ Current state of the art: DH is used for key exchange. RSA is used to sign the exchanged DH public keys. The public and private Diffie-Hellman keys are only temporary and can be deleted after the shared secret key has been calculated.

+ Instead of DH or RSA, methods using elliptic curves are often used today, which allow for shorter key lengths.
