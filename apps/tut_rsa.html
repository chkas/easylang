txt_tutor=`* RSA

+ RSA is a way to protect messages using two keys: a public key to lock the message and a private key to unlock it.

+ The trick is that breaking RSA would require factoring a huge number, which is extremely hard.

+ This lets anyone send you secret messages only you can read.

+ You can also use RSA to sign messages so others know they really came from you.

* Big number functions

+ Big numbers are expressed as arrays of numbers. This is a library that implements arithmetic operations with big numbers.

#lib
func[] bn s$ .
   i = len s$ - 7 + 1
   while i >= -5
      r[] &= number substr s$ i 7
      i -= 7
   .
   return r[]
.
func$ bns bn[] .
   s$ = bn[$]
   for i = len bn[] - 1 downto 1
      h$ = bn[i]
      s$ &= substr "0000000" 1 (7 - len h$) & h$
   .
   return s$
.
func[] bnmul a[] b[] .
   len r[] len a[] + len b[]
   if len a[] > len b[] : swap a[] b[]
   for ia = 1 to len a[]
      h = 0
      for ib = 1 to len b[]
         h += r[ia + ib - 1] + b[ib] * a[ia]
         r[ia + ib - 1] = h mod 10000000
         h = h div 10000000
      .
      r[ia + ib - 1] += h
   .
   while r[$] = 0 and len r[] > 1 : len r[] -1
   return r[]
.
func[] bnadd a[] b[] .
   if len b[] > len a[] : swap a[] b[]
   len r[] len a[]
   for i = 1 to len r[]
      v = 0
      if i <= len b[] : v = b[i]
      h += a[i] + v
      r[i] = h mod 10000000
      h = h div 10000000
   .
   if h > 0 : r[] &= h
   while len r[] > 1 and r[$] = 0 : len r[] -1
   return r[]
.
func bncmp a[] b[] .
   if len a[] > len b[] : return 1
   if len a[] < len b[] : return -1
   for i = len a[] downto 1
      if a[i] > b[i] : return 1
      if a[i] < b[i] : return -1
   .
   return 0
.
func[] bnsub a[] b[] .
   len r[] len a[]
   for i = 1 to len r[]
      v = 0
      if i <= len b[] : v = b[i]
      h = a[i] - v - h
      if h < 0
         r[i] = h + 10000000
         h = 1
      else
         r[i] = h
         h = 0
      .
   .
   while r[$] = 0 and len r[] > 1 : len r[] -1
   return r[]
.
func[][] bndivmod a[] b[] .
   if bncmp a[] b[] < 0 : return [ [ 0 ] a[] ]
   lb = len b[]
   d = 10000000 div (b[lb] + 1)
   if d > 1
      for i = 1 to lb
         c += b[i] * d
         b[i] = c mod 10000000
         c = c div 10000000
      .
      for i = 1 to len a[]
         c += a[i] * d
         a[i] = c mod 10000000
         c = c div 10000000
      .
   .
   a[] &= c
   #
   len q[] len a[] - lb
   v1 = b[lb]
   if lb >= 2 : v2 = b[lb - 1]
   for j = len q[] downto 1
      u0 = a[j + lb]
      u1 = a[j + lb - 1]
      u2 = 0
      if j + lb >= 2 : u2 = a[j + lb - 2]
      if u0 = v1
         qh = 9999999
         rh = u1 + v1
      else
         h = u0 * 10000000 + u1
         qh = h div v1
         rh = h mod v1
      .
      while rh < 10000000 and qh * v2 > 10000000 * rh + u2
         qh -= 1
         rh += v1
      .
      k = 0
      for i = 1 to lb
         p = qh * b[i] + k
         k = p div 10000000
         t = a[j + i - 1] - (p mod 10000000)
         if t < 0
            t += 10000000
            k += 1
         .
         a[j + i - 1] = t
      .
      t = a[j + lb] - k
      if t < 0
         qh -= 1
         k = 0
         for i = 1 to lb
            t = a[j + i - 1] + b[i] + k
            a[j + i - 1] = t mod 10000000
            k = t div 10000000
         .
         a[j + lb] = t + k
      else
         a[j + lb] = t
      .
      q[j] = qh
   .
   if d > 1
      k = 0
      for i = lb downto 1
         t = k * 10000000 + a[i]
         a[i] = t div d
         k = t mod d
      .
   .
   len a[] lb
   while len q[] > 1 and q[len q[]] = 0 : len q[] len q[] - 1
   while len a[] > 1 and a[len a[]] = 0 : len a[] len a[] - 1
   return [ q[] a[] ]
.
func[] bnmod a[] n[] .
   result[][] = bndivmod a[] n[]
   return result[2][]
.
func[] bndiv a[] n[] .
   result[][] = bndivmod a[] n[]
   return result[1][]
.
func[] bnpowmod base[] exp[] m[] .
   r[] = [ 1 ]
   b[] = bnmod base[] m[]
   e[] = exp[]
   while bncmp e[] [ 0 ] > 0
      if e[1] mod 2 = 1
         r[] = bnmul r[] b[]
         r[] = bnmod r[] m[]
      .
      h = 0
      for i = len e[] downto 1
         h = h * 10000000 + e[i]
         e[i] = h div 2
         h = h mod 2
      .
      while e[$] = 0 and len e[] > 1 : len e[] -1
      b[] = bnmul b[] b[]
      b[] = bnmod b[] m[]
   .
   return r[]
.
func[] bnrandr n[] .
   len r[] len n[]
   for i = 1 to len n[]
      r[i] = random 10000000 - 1
   .
   r[$] = r[$] mod n[$]
   if bncmp r[] [ 2 ] < 0 : return [ 2 ]
   return r[]
.
func bnprim n[] k .
   nm1[] = bnsub n[] [ 1 ]
   d[] = nm1[]
   while d[1] mod 2 = 0
      h = 0
      for i = len d[] downto 1
         h = h * 10000000 + d[i]
         d[i] = h div 2
         h = h mod 2
      .
      while d[$] = 0 and len d[] > 1 : len d[] -1
      s += 1
   .
   for i = 1 to k
      a[] = bnrandr n[]
      x[] = bnpowmod a[] d[] n[]
      if bncmp x[] [ 1 ] <> 0 and bncmp x[] nm1[] <> 0
         for r = 1 to s - 1
            x[] = bnmul x[] x[]
            x[] = bnmod x[] n[]
            if bncmp x[] [ 1 ] = 0 : return 0
            if bncmp x[] nm1[] = 0 : break 1
         .
         if r >= s : return 0
      .
   .
   return 1
.
func[] bnrand ndig .
   narr = ndig div 7 + 1
   ndigh = ndig mod 7
   len r[] narr
   for i = 1 to narr - 1 : r[i] = random 10000000 - 1
   r[narr] = random (pow 10 ndigh - 1)
   return r[]
.
func[] bnmodinv a[] n[] .
   t0[] = [ 0 ]
   t1[] = [ 1 ]
   r0[] = n[]
   r1[] = bnmod a[] n[]
   while bncmp r1[] [ 0 ] > 0
      h[][] = bndivmod r0[] r1[]
      q[] = h[1][]
      r2[] = h[2][]
      h[] = bnmul q[] t1[]
      h[] = bnmod h[] n[]
      t2[] = bnadd t0[] n[]
      t2[] = bnsub t2[] h[]
      t2[] = bnmod t2[] n[]
      r0[] = r1[]
      r1[] = r2[]
      t0[] = t1[]
      t1[] = t2[]
   .
   if bncmp r0[] [ 1 ] <> 0 : return [ 0 ]
   return t0[]
.

* RSA Demo

+ First, we need two large random prime numbers. From about 150 decimal places, this should be secure. We are using 75 for our demo.

+ With such large numbers, it is almost impossible to guarantee that they are prime, but it is possible to determine this with a high degree of probability.

+ These numbers remain secret because they are the private key. The decryption key can be derived directly from these factors.

+ The public key is the product of these numbers, which is then twice as long. So, 300 digits or more if it is to be secure. It is not (currently) possible for computers to break this number down into its factors

func[] factor n .
   p[] = bnrand n
   if p[1] mod 2 = 0 : p[1] += 1
   while bnprim p[] 20 = 0
      p[] = bnadd p[] [ 2 ]
   .
   return p[]
.
func[] rsaenc n[] m$ .
   for c$ in strchars m$
      h = strcode c$ - 28
      if h <= 9 : mn$ &= 0
      mn$ &= h
   .
   return bnpowmod bn mn$ [ 65537 ] n[]
.
func$ rsadec n[] d[] enc[] .
   m2[] = bnpowmod enc[] d[] n[]
   mn$ = bns m2[]
   for i = 1 step 2 to len mn$
      m$ &= strchar (number substr mn$ i 2 + 28)
   .
   return m$
.
func[][] genrsakey .
   write "."
   p[] = factor 75
   write "."
   q[] = factor 75
   print "."
   n[] = bnmul p[] q[]
   p[] = bnsub p[] [ 1 ]
   q[] = bnsub q[] [ 1 ]
   phi[] = bnmul p[] q[]
   d[] = bnmodinv [ 65537 ] phi[]
   return [ n[] d[] ]
.
k[][] = genrsakey
n[] = k[1][]
print "Public key: " & bns n[]
print ""
d[] = k[2][]
#
enc[] = rsaenc n[] "This is for my eyes only."
print "Encrypted with public key: " & bns enc[]
print ""
print "Decrypted with private key: " & rsadec n[] d[] enc[]
